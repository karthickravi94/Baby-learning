<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolam Drawing Guide – கோலம் கற்றுக்கொள்வோம்</title>
<style>
  :root {
    --bg:       #09011c;
    --bg2:      #130428;
    --card:     rgba(255,255,255,0.04);
    --border:   rgba(255,215,0,0.22);
    --gold:     #FFD700;
    --orange:   #FF8C00;
    --red:      #E8365D;
    --cream:    #FFF5DC;
    --dim:      rgba(255,255,255,0.6);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: radial-gradient(ellipse at 50% 0%, #2a1060 0%, var(--bg) 65%);
    min-height: 100vh;
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--cream);
    padding: 16px;
  }

  /* ── Header ── */
  .site-header {
    text-align: center;
    padding: 28px 0 18px;
  }
  .ornament { color: var(--gold); font-size: 1.4em; letter-spacing: 6px; opacity: .7; }
  .title-ta {
    font-size: clamp(1.6em, 5vw, 2.6em);
    color: var(--gold);
    letter-spacing: 4px;
    text-shadow: 0 0 28px rgba(255,215,0,.45);
    margin: 6px 0 2px;
  }
  .title-en {
    font-size: clamp(.9em, 2.5vw, 1.15em);
    color: var(--orange);
    letter-spacing: 2px;
  }
  .subtitle {
    margin-top: 6px;
    font-size: .82em;
    color: var(--dim);
    font-style: italic;
  }

  /* ── Progress dots ── */
  .progress-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 18px 0 4px;
  }
  .pdot {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    border: 1.5px solid rgba(255,215,0,.35);
    cursor: pointer;
    transition: all .28s ease;
    padding: 0;
  }
  .pdot.active {
    background: var(--gold);
    box-shadow: 0 0 10px rgba(255,215,0,.8);
    transform: scale(1.25);
  }

  /* ── Card ── */
  .card {
    max-width: 960px;
    margin: 10px auto 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 30px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,.55),
                inset 0 1px 0 rgba(255,255,255,.06);
    transition: opacity .2s, transform .2s;
  }
  .card.fade-out { opacity: 0; transform: translateY(6px); }
  .card.fade-in  { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

  /* ── Kolam Header ── */
  .kolam-header { text-align: center; margin-bottom: 26px; }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--orange), var(--gold));
    color: #09011c;
    padding: 3px 14px;
    border-radius: 20px;
    font-size: .75em;
    font-weight: bold;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .kolam-name-ta {
    font-size: clamp(1.1em, 3vw, 1.55em);
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,.3);
    margin-bottom: 2px;
  }
  .kolam-name-en {
    font-size: clamp(1.3em, 4vw, 2em);
    color: var(--cream);
    margin-bottom: 8px;
  }
  .kolam-desc {
    color: var(--dim);
    font-size: .93em;
    line-height: 1.7;
    max-width: 620px;
    margin: 0 auto;
  }

  /* ── Body grid ── */
  .kolam-body {
    display: grid;
    grid-template-columns: 270px 1fr;
    gap: 32px;
    align-items: start;
  }

  /* ── SVG canvas ── */
  .canvas-wrap {
    background: #050110;
    border: 1px solid rgba(255,215,0,.12);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .canvas-wrap svg { width: 100%; height: auto; }
  .canvas-label {
    font-size: .72em;
    letter-spacing: 1px;
    color: rgba(255,255,255,.3);
    text-transform: uppercase;
  }

  /* ── Steps ── */
  .steps-heading {
    font-size: 1.15em;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,215,0,.2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .steps-list { list-style: none; display: flex; flex-direction: column; gap: 13px; }
  .step { display: flex; gap: 13px; align-items: flex-start; }
  .step-num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c0392b, var(--red));
    display: flex; align-items: center; justify-content: center;
    font-size: .82em; font-weight: bold; color: #fff;
    box-shadow: 0 2px 8px rgba(232,54,93,.4);
  }
  .step-body { padding-top: 5px; }
  .step-text { color: rgba(255,255,255,.85); font-size: .93em; line-height: 1.6; }
  .step-tip {
    color: var(--orange); font-size: .8em;
    font-style: italic; margin-top: 4px;
  }

  /* ── Navigation ── */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    padding-top: 22px;
    border-top: 1px solid rgba(255,215,0,.14);
    gap: 12px;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 11px 26px;
    border-radius: 28px;
    border: none;
    font-size: .95em;
    font-weight: bold;
    font-family: Georgia, serif;
    cursor: pointer;
    letter-spacing: .8px;
    transition: all .25s ease;
    white-space: nowrap;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--orange), var(--gold));
    color: #09011c;
  }
  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(255,215,0,.38);
  }
  .btn-prev {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,215,0,.25);
    color: var(--cream);
  }
  .btn-prev:hover:not(:disabled) {
    background: rgba(255,255,255,.1);
    transform: translateY(-2px);
  }
  .btn:disabled { opacity: .25; cursor: not-allowed; transform: none !important; }

  .nav-center { text-align: center; }
  .page-num { font-size: 1em; color: var(--gold); letter-spacing: 2px; display: block; }
  .diff-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 5px; }
  .diff-label { font-size: .7em; color: var(--dim); letter-spacing: 1px; }
  .diff-pip {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.18);
    transition: all .3s;
  }
  .diff-pip.on { background: var(--orange); box-shadow: 0 0 6px rgba(255,140,0,.7); }

  /* ── Footer ── */
  .site-footer {
    text-align: center;
    margin-top: 28px;
    padding-bottom: 20px;
    color: rgba(255,255,255,.3);
    font-size: .8em;
    line-height: 1.8;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .kolam-body { grid-template-columns: 1fr; }
    .canvas-wrap { max-width: 260px; margin: 0 auto; }
    .card { padding: 18px 14px; }
    .btn { padding: 10px 18px; font-size: .85em; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="ornament">✦ ❋ ✦</div>
  <div class="title-ta">கோலம் வரைவோம்</div>
  <div class="title-en">Learn to Draw Kolam</div>
  <div class="subtitle">Step-by-step traditional South Indian floor art</div>
  <div class="progress-row" id="progressRow"></div>
</header>

<div class="card" id="mainCard">
  <div class="kolam-header" id="kolamHeader"></div>
  <div class="kolam-body">
    <div class="canvas-wrap">
      <div id="kolamSvg"></div>
      <div class="canvas-label">Complete Pattern</div>
    </div>
    <div>
      <div class="steps-heading">✏️ How to Draw — Step by Step</div>
      <ul class="steps-list" id="stepsList"></ul>
    </div>
  </div>
  <div class="nav-bar">
    <button class="btn btn-prev" id="prevBtn" onclick="navigate(-1)">← Previous</button>
    <div class="nav-center">
      <span class="page-num" id="pageNum"></span>
      <div class="diff-row" id="diffRow"></div>
    </div>
    <button class="btn btn-next" id="nextBtn" onclick="navigate(1)">Next →</button>
  </div>
</div>

<footer class="site-footer">
  <div>🌸 கோலம் தமிழ் கலாச்சாரத்தின் ஒரு அழகான பகுதி 🌸</div>
  <div>Kolam is a beautiful part of Tamil culture</div>
</footer>

<script>
/* ═══════════════════════════════════════════════
   Kolam data — 5 patterns, each with SVG + steps
═══════════════════════════════════════════════ */
const kolams = [

  /* ── 1 · 4-Petal Lotus ── */
  {
    title: '4-Petal Lotus Kolam',
    tamil: 'தாமரை கோலம்',
    difficulty: 'Beginner',
    description: 'The simplest and most beloved kolam. Four soft petals arranged in a cross around a glowing center — perfect as your very first kolam.',
    svg: `<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1a" cx="50%" cy="50%" r="50%">

  <ellipse cx="160" cy="100" rx="14" ry="28"

  <ellipse cx="100" cy="160" rx="14" ry="28"

  <circle cx="130" cy="224" r="4.5" fill="white" opacity=".85"/>
  <circle cx="36"  cy="130" r="4.5" fill="white" opacity=".85"/>
  <circle cx="224" cy="130" r="4.5" fill="white" opacity=".85"/>

  <!-- corner accent dots -->
  <circle cx="88" cy="88" r="3.2" fill="#FF8C00" opacity=".75"/>

  <circle cx="88" cy="172" r="3.2" fill="#FF8C00" opacity=".75"/>
  <circle cx="172" cy="172" r="3.2" fill="#FF8C00" opacity=".75"/>

  <circle cx="130" cy="130" r="110"
    fill="none" stroke="rgba(255,215,0,.18)" stroke-width="1"
    stroke-dasharray="4 8"/>
</svg>`,

      { text: 'Place a single dot exactly in the centre of your drawing space. This is the anchor for the whole kolam.' ,
        tip: 'Use rice flour or white chalk on a clean, flat surface.' },
      { text: 'Draw a tall, thin oval (ellipse) pointing straight up from the centre dot — this is the North petal.' },
      { text: 'Mirror it below the centre dot, pointing straight down — this is the South petal.' },
      { text: 'Draw a wide, flat oval pointing to the left of the centre — the West petal.' },
      { text: 'Draw the matching oval to the right — the East petal. You now have a four-petal cross shape.' },
      { text: 'Draw a circle where all four petals meet. Add a small inner circle and a bright dot at the very centre. Finish with a small dot at the tip of each petal.',
        tip: 'Add tiny orange dots in the four diagonal corners for extra decoration.' },
    ],
  },

  /* ── 2 · 8-Pointed Star ── */
  {
    title: '8-Pointed Star Kolam',
    tamil: 'அஷ்டகோண கோலம்',
    difficulty: 'Beginner',
    description: 'Eight rays burst outward from a single centre, forming a radiant star. It symbolises the eight directions and is one of the most auspicious kolam shapes.',
    svg: `<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g2a" cx="50%" cy="50%" r="50%">

    fill="rgba(255,140,0,.12)" stroke="#FF8C00" stroke-width="1.8"/>

  <!-- center -->
  <circle cx="130" cy="130" r="30"
    fill="rgba(232,54,93,.1)" stroke="#E8365D" stroke-width="1.8"/>
  <circle cx="130" cy="130" r="9" fill="#FFD700"/>

  <!-- cardinal tip dots -->
  <circle cx="230" cy="130" r="4.5" fill="white" opacity=".85"/>
  <circle cx="130"  cy="30" r="4.5" fill="white" opacity=".85"/>

  <!-- diagonal tip dots -->
  <circle cx="200.7" cy="59.3"  r="4"   fill="#FFD700" opacity=".85"/>
  <circle cx="200.7" cy="200.7" r="4"   fill="#FFD700" opacity=".85"/>
  <circle cx="59.3"  cy="59.3"  r="4"   fill="#FFD700" opacity=".85"/>
  <circle cx="59.3"  cy="200.7" r="4"   fill="#FFD700" opacity=".85"/>

  <!-- subtle axis lines -->
  <line x1="130" y1="30"  x2="130" y2="230" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="30"  y1="130" x2="230" y2="130" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <line x1="200.7" y1="59.3" x2="59.3" y2="200.7" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
</svg>`,

      { text: 'Mark the centre and draw a straight vertical line, equal length above and below.' },
      { text: 'Cross it with a horizontal line of the same length — you now have a plus (+) sign with 4 tips.' },
      { text: 'Draw a diagonal line from top-left to bottom-right through the centre, same length as before.' },
      { text: 'Add a second diagonal from top-right to bottom-left. You now have 8 tips radiating from the centre.' },
      { text: 'Connect the tips in a zigzag: draw a line from the end of one ray to the midpoint between the next two rays, then out to the next ray tip, and so on, all the way around.',

      { text: 'Draw a small circle in the centre and place a bright dot inside it. Add dots at each of the 8 outer star points to finish.' },
    ],
  },

  /* ── 3 · 6-Petal Flower ── */

    title: '6-Petal Flower Kolam',
    tamil: 'ஆறு இதழ் கோலம்',
    difficulty: 'Intermediate',
    description: 'Six identical petals bloom at perfectly even 60° intervals. This flower kolam is a staple at festivals and celebrations, representing the six seasons of the Tamil calendar.',

      { text: 'Draw a circle where all petals overlap at the centre to create the flower\'s "eye".' },
      { text: 'Add a smaller inner circle, a bright dot in the middle, and a small dot at the tip of each petal. Optionally colour alternate petals in different warm shades.' },
    ],

  /* ── 4 · Nested Diamonds ── */
  {
    title: 'Diamond Kolam',
    tamil: 'வைர கோலம்',
    difficulty: 'Intermediate',
    description: 'Three diamonds nested inside each other, each rotated 45°, create an elegant geometric pattern. Diamonds in kolam represent prosperity and symmetry in all directions.',
    svg: `<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g4a" cx="50%" cy="50%" r="50%">

/* ═════════════════════════════
   App logic
═════════════════════════════ */
let current = 0;

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= kolams.length) return;

  const card = document.getElementById('mainCard');
  card.classList.add('fade-out');
  setTimeout(() => {
    current = next;
    render();
    card.classList.remove('fade-out');
    card.classList.add('fade-in');
    setTimeout(() => card.classList.remove('fade-in'), 400);
  }, 200);
}

function render() {
  const k = kolams[current];

  /* header */
  document.getElementById('kolamHeader').innerHTML = `
    <div class="badge">KOLAM ${current + 1} OF ${kolams.length} &nbsp;·&nbsp; ${k.difficulty}</div>
    <div class="kolam-name-ta">${k.tamil}</div>
    <div class="kolam-name-en">${k.title}</div>
    <div class="kolam-desc">${k.description}</div>
  `;

  /* SVG */
  document.getElementById('kolamSvg').innerHTML = k.svg;

  /* steps */
  document.getElementById('stepsList').innerHTML = k.steps.map((s, i) => `
    <li class="step">
      <div class="step-num">${i + 1}</div>
      <div class="step-body">
        <div class="step-text">${s.text}</div>
        ${s.tip ? `<div class="step-tip">💡 ${s.tip}</div>` : ''}
      </div>
    </li>
  `).join('');

  /* nav buttons */
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === kolams.length - 1;
  document.getElementById('pageNum').textContent = `${current + 1} / ${kolams.length}`;

  /* difficulty pips */
  const levels = { Beginner: 1, Intermediate: 2, Advanced: 3 };
  const lvl = levels[k.difficulty] || 1;
  document.getElementById('diffRow').innerHTML =
    `<span class="diff-label">${k.difficulty}</span>` +
    [1, 2, 3].map(i => `<div class="diff-pip${i <= lvl ? ' on' : ''}"></div>`).join('');

  /* progress dots */
  document.querySelectorAll('.pdot').forEach((d, i) =>
    d.classList.toggle('active', i === current));
}

/* build progress dots */
const row = document.getElementById('progressRow');
kolams.forEach((_, i) => {
  const b = document.createElement('button');
  b.className = 'pdot' + (i === 0 ? ' active' : '');
  b.title = kolams[i].title;
  b.setAttribute('aria-label', `Go to kolam ${i + 1}: ${kolams[i].title}`);
  b.onclick = () => { if (current !== i) { current = i; render(); } };
  row.appendChild(b);
});

/* keyboard navigation */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

render();
</script>
